name: Snowboard Kids2 (North America)
sha1: 5ce896fd64276948bc2b8cccd8cd51c25a9f32aa
options:
  basename: snowboardkids2
  target_path: snowboardkids2.z64
  elf_path: build/snowboardkids2.elf
  base_path: .
  extensions_path: tools/splat_ext
  platform: n64
  compiler: KMC
  ld_script_path: snowboardkids2.ld
  find_file_boundaries: True
  header_encoding: ASCII
  o_as_suffix: True
  mips_abi_float_regs: o32
  section_order: [".text", ".data", ".rodata", ".bss"]
  auto_link_sections: [".data", ".rodata", ".bss"]
  symbol_addrs_path:
    - symbol_addrs.txt
  reloc_addrs_path:
    - reloc_addrs.txt
  undefined_funcs_auto_path: undefined_funcs_auto.txt
  undefined_syms_auto_path: undefined_syms_auto.txt
  lib_path: build/lib
  symbol_name_format: $VRAM_$ROM
  migrate_rodata_to_functions: True
  gfx_ucode: f3dex2
  string_encoding: ASCII
  data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2
  libultra_symbols: True
  hardware_regs: True
  hasm_in_src_path: True
  disassemble_all: True
  asm_emit_size_directive: True

segments:
  - name: header
    type: header
    start: 0x0

  - name: boot
    type: bin
    start: 0x40

  - name: entry
    type: code
    start: 0x1000
    vram: 0x80000400
    subsegments:
      - [0x1000, hasm, entrypoint/entrypoint]

  - name: main
    type: code
    start: 0x1050
    vram: 0x80000450
    follows_vram: entry
    bss_size: 0x10D40
    subalign: 8
